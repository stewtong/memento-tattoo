name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[test]"
      - name: Run tests
        run: python -m pytest -q
      - name: Build distributions
        run: |
          python -m pip install build
          python -m build
      - name: Smoke example CLI
        run: |
          memento-tattoo --root examples/basic/memento doctor
          memento-tattoo --root examples/basic/memento load --query "sanitize public release"
